<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<style>

body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:10px;
}

.card {

  background:#1e293b;
  padding:12px;
  margin:10px 0;
  border-radius:12px;

}

button {

  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;

}

.green { background:#22c55e; }
.red   { background:#ef4444; }
.blue  { background:#3b82f6; }
.gray  { background:#475569; }

</style>

</head>

<body>

<h2>
⚡ OT Dashboard
</h2>

<div class="card">

<button
class="blue"
onclick="load()">

🔄 Refresh

</button>

<pre id="ot">
Loading...
</pre>

</div>

<div class="card">

<h3>Actions</h3>

<button
class="green"
onclick="action('accept')">

✅ Accept

</button>

<button
class="red"
onclick="action('refuse')">

❌ Refuse

</button>

<button
class="gray"
onclick="action('skip')">

⏭️ Skip

</button>

<br><br>

<button
class="blue"
onclick="today()">

📅 Today Shift

</button>

<button
class="blue"
onclick="tomorrow()">

📅 Tomorrow Shift

</button>

<button
class="blue"
onclick="leaveForm()">

📝 Leave Entry

</button>

<button
class="blue"
onclick="mutualForm()">

🤝 Mutual Entry

</button>

<button
class="blue"
onclick="history()">

📊 OT History

</button>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwq11zVwDaZC1ddWjpUJxtW5S6Kpx4Xxgt0pYMTNI5zwAVoWqWqujDt1gtSnztbCgeyXQ/exec";

// LOAD OT
async function load(){

let ot =
await fetch(
API + "?action=getOT"
).then(r=>r.text());

document
.getElementById("ot")
.innerText = ot;

}

// ACTION BUTTON
async function action(type) {

  if (type === "accept") {

    // NEXT EMPLOYEE INFO fetch
    let info =
      await fetch(
        API +
        "?action=getNextInfo"
      )
      .then(r => r.json());

    if (!info.name) {

      alert(
        "No employee available"
      );

      return;

    }

    let msg =

      "✅ OT Accept Confirm?\n" +
      "─────────────────────\n" +

      "👤 Employee  : " +
      info.name + "\n" +

      "🕐 Aaj Shift : " +
      info.todayShift + "\n" +

      "⚡ OT Shift  : " +
      info.otShift +

      (info.isTomorrow ?
       " (Kal)" : "") +

      "\n📅 OT Date   : " +
      info.otDate +

      "\n─────────────────────\n" +

      "Confirm karo?";

    let ok = confirm(msg);

    if (!ok) return;

  }

  if (type === "refuse") {

    let ok =
      confirm("❌ Refuse Confirm?");

    if (!ok) return;

  }

  if (type === "skip") {

    let ok =
      confirm("⏭️ Skip Confirm?");

    if (!ok) return;

  }

  // API CALL
  fetch(
    API +
    "?action=" +
    type
  );

  setTimeout(load,1000);

}
// TODAY SHIFT
async function today(){

let data =
await fetch(
API + "?action=getToday"
).then(r=>r.text());

alert(data);

}

// TOMORROW SHIFT
async function tomorrow(){

let data =
await fetch(
API + "?action=getTomorrow"
).then(r=>r.text());

alert(data);

}

// PLACEHOLDERS
function leaveForm(){

alert(
"Open Leave Form"
);

}

function mutualForm(){

alert(
"Open Mutual Form"
);

}

function history(){

alert(
"Show OT History"
);

}

// AUTO LOAD
load();

</script>

</body>
</html>
