<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:10px;
}

.card{
background:#1e293b;
padding:12px;
margin:10px 0;
border-radius:12px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:20%;
left:10%;
width:80%;
background:#1e293b;
padding:15px;
border-radius:12px;
}

</style>

</head>

<body>

<h2>⚡ OT Dashboard</h2>

<div class="card">

<button onclick="load()">
🔄 Refresh
</button>

<pre id="ot">
Loading...
</pre>

</div>

<div class="card">

<button onclick="accept()">
✅ Accept
</button>

<button onclick="action('refuse')">
❌ Refuse
</button>

<button onclick="action('skip')">
⏭ Skip
</button>

<br>

<button onclick="openHistory()">
📊 OT History
</button>

</div>

<!-- HISTORY -->

<div id="historyPopup"
class="popup">

<h3>OT History</h3>

<pre id="historyData">
Loading...
</pre>

<button onclick="closeHistory()">
Close
</button>

</div>

<script>

const API=
"https://script.google.com/macros/s/AKfycbwq11zVwDaZC1ddWjpUJxtW5S6Kpx4Xxgt0pYMTNI5zwAVoWqWqujDt1gtSnztbCgeyXQ/exec";

async function load(){

let ot=
await fetch(
API+"?action=getOT"
).then(r=>r.text());

document
.getElementById("ot")
.innerText=ot;

}


// ACCEPT popup

async function accept(){

let info=
await fetch(
API+"?action=getNext"
).then(r=>r.json());

let msg=

"✅ OT Accept Confirm?\n\n"+

"👤 "+info.name+"\n"+

"🕐 "+info.todayShift+"\n"+

"⚡ "+info.otShift+"\n"+

"📅 "+info.otDate;

if(!confirm(msg))
return;

fetch(
API+"?action=accept"
);

setTimeout(load,1000);

}


// REFUSE / SKIP

function action(type){

let ok=
confirm(type+" confirm?");

if(!ok) return;

fetch(
API+"?action="+type
);

setTimeout(load,1000);

}


// HISTORY

async function openHistory(){

document
.getElementById(
"historyPopup"
).style.display="block";

let data=
await fetch(
API+"?action=history"
).then(r=>r.json());

let txt="";

data.forEach(r=>{

txt+=

r.date+
"  "+
r.name+
"  "+
r.shift+
"\n";

});

document
.getElementById(
"historyData"
).innerText=txt;

}

function closeHistory(){

document
.getElementById(
"historyPopup"
).style.display="none";

}

load();

</script>

</body>

</html>
</body>
</html>
