<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:10px;
}

.card{
background:#1e293b;
padding:12px;
margin:10px 0;
border-radius:12px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.popup{
display:none;
position:fixed;
top:10%;
left:5%;
width:90%;
background:#1e293b;
padding:15px;
border-radius:12px;
}

</style>

</head>

<body>

<h2>⚡ OT Dashboard</h2>

<div class="card">

<button onclick="load()">
🔄 Refresh
</button>

<pre id="ot">
Loading...
</pre>

</div>

<div class="card">

<button onclick="accept()">
✅ Accept
</button>

<button onclick="action('refuse')">
❌ Refuse
</button>

<button onclick="action('skip')">
⏭ Skip
</button>

<br>

<button onclick="todayPopup()">
📅 Today Shift
</button>

<button onclick="tomorrowPopup()">
📆 Tomorrow Shift
</button>

<button onclick="historyPopup()">
📊 OT History
</button>

<br>

<button onclick="openLeave()">
📝 Leave
</button>

<button onclick="openMutual()">
🔄 Mutual
</button>

</div>


<!-- COMMON POPUP -->

<div id="popup"
class="popup">

<pre id="popupText">
Loading...
</pre>

<button onclick="closePopup()">
Close
</button>

</div>


<!-- LEAVE FORM -->

<div id="leaveForm"
class="popup">

<h3>Leave Entry</h3>

<input id="leaveName"
placeholder="Employee">

<br><br>

<input type="date"
id="leaveFrom">

<br><br>

<input type="date"
id="leaveTo">

<br><br>

<input id="leaveReason"
placeholder="Reason">

<br><br>

<button onclick="submitLeave()">
Submit
</button>

<button onclick="closeLeave()">
Cancel
</button>

</div>



<!-- MUTUAL FORM -->

<div id="mutualForm"
class="popup">

<h3>Mutual Entry</h3>

<input id="emp1"
placeholder="Employee 1">

<br><br>

<input id="emp2"
placeholder="Employee 2">

<br><br>

<input type="date"
id="mutualDate">

<br><br>

<button onclick="submitMutual()">
Submit
</button>

<button onclick="closeMutual()">
Cancel
</button>

</div>



<script>

const API="https://script.google.com/macros/s/AKfycbwSIBUgRZSAM-mLLJqfpKrIoJNX1Dz1fSi0LGSqJIBCYon4rmNtqfK2eMG56ViJQ0X_CA/exec";

async function load(){

let ot=
await fetch(
API+"?action=getOT"
).then(r=>r.text());

document
.getElementById("ot")
.innerText=ot;

}


// TODAY

async function todayPopup(){

let txt=
await fetch(
API+"?action=todayWeb"
).then(r=>r.text());

showPopup(txt);

}


// TOMORROW

async function tomorrowPopup(){

let txt=
await fetch(
API+"?action=tomorrowWeb"
).then(r=>r.text());

showPopup(txt);

}


// HISTORY

async function historyPopup(){

let txt=
await fetch(
API+"?action=historyWeb"
).then(r=>r.text());

showPopup(txt);

}


// SHOW POPUP

function showPopup(text){

document
.getElementById(
"popup"
).style.display="block";

document
.getElementById(
"popupText"
).innerText=text;

}

function closePopup(){

document
.getElementById(
"popup"
).style.display="none";

}


// LEAVE

function openLeave(){

document
.getElementById(
"leaveForm"
).style.display="block";

}

function closeLeave(){

document
.getElementById(
"leaveForm"
).style.display="none";

}

function submitLeave(){

fetch(

API+

"?action=leaveWeb"+

"&name="+
document
.getElementById("leaveName").value+

"&from="+
document
.getElementById("leaveFrom").value+

"&to="+
document
.getElementById("leaveTo").value+

"&reason="+
document
.getElementById("leaveReason").value

);

alert("Leave Submitted");

closeLeave();

}


// MUTUAL

function openMutual(){

document
.getElementById(
"mutualForm"
).style.display="block";

}

function closeMutual(){

document
.getElementById(
"mutualForm"
).style.display="none";

}

function submitMutual(){

fetch(

API+

"?action=mutualWeb"+

"&emp1="+
document.getElementById("emp1").value+

"&emp2="+
document.getElementById("emp2").value+

"&date="+
document.getElementById("mutualDate").value

);

alert("Mutual Submitted");

closeMutual();

}


load();

</script>

</body>

</html>
